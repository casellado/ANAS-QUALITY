<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Corpo camion -->
  <rect x="2" y="30" width="22" height="14" rx="2" fill="#3B82F6"/>
  <!-- Cabina -->
  <path d="M24 26h12l6 8v10H24V26z" fill="#60A5FA" stroke="#1D4ED8" stroke-width="1.2"/>
  <!-- Parabrezza -->
  <path d="M26 28h8l4 6H26z" fill="#93C5FD" opacity="0.7"/>
  <!-- Tamburo betoniera (il cilindro che ruota) -->
  <ellipse cx="15" cy="22" rx="14" ry="10" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
  <!-- Strisce tamburo -->
  <path d="M5 18c3 4 7 7 12 8s8-1 12-5" stroke="#FBBF24" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M4 22c4 3 8 5 13 5s9-2 12-5" stroke="#FBBF24" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Bocca versamento -->
  <path d="M28 14l5-2v4l-5 2z" fill="#D97706"/>
  <!-- Supporto tamburo -->
  <line x1="14" y1="30" x2="14" y2="32" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="28" x2="24" y2="32" stroke="#475569" stroke-width="2"/>
  <!-- Telaio -->
  <rect x="1" y="44" width="42" height="3" rx="1.5" fill="#334155"/>
  <!-- Ruota anteriore -->
  <circle cx="10" cy="49" r="5.5" fill="#1E293B" stroke="#64748B" stroke-width="1.2"/>
  <circle cx="10" cy="49" r="2.5" fill="#475569"/>
  <circle cx="10" cy="49" r="1" fill="#94A3B8"/>
  <!-- Ruota posteriore -->
  <circle cx="36" cy="49" r="5.5" fill="#1E293B" stroke="#64748B" stroke-width="1.2"/>
  <circle cx="36" cy="49" r="2.5" fill="#475569"/>
  <circle cx="36" cy="49" r="1" fill="#94A3B8"/>
  <!-- Dettagli cabina -->
  <rect x="40" y="34" width="2" height="4" rx="1" fill="#EF4444"/>
  <!-- Paraurti -->
  <rect x="40" y="42" width="4" height="2" rx="1" fill="#64748B"/>
</svg>

